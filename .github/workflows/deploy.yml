name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build NestJS Backend
      run: |
        cd backend-api
        npm ci
        npm run build
        
    - name: Build Next.js Website
      run: |
        cd website
        npm ci
        npm run build

