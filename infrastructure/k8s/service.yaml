apiVersion: v1
kind: Service
metadata:
  name: dhobi-backend-service
spec:
  selector:
    app: dhobi-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: dhobi-website-service
spec:
  selector:
    app: dhobi-website
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
